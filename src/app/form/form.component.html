<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css" rel="stylesheet">
<div class="container">
  <div class="contact__wrapper shadow-lg mt-n9">
    <div class="row no-gutters">
      <div class="col-lg-5 contact-info__wrapper gradient-brand-color p-5 order-lg-2">
        <h3 class="color--white mb-5">Output</h3>
        <textarea class="form-control" [innerText]="luaContent || ''" rows="10" readonly></textarea>
      </div>

      <div class="col-lg-7 form__wrapper p-5 order-lg-1">
        <h3 class="color--white mb-5">Item Form</h3>
        <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form form-validate" novalidate>
          <div class="row">

            <!-- Campos base -->
            <ng-container *ngFor="let field of coreFields">
              <ng-container *ngTemplateOutlet="fieldTpl; context: { $implicit: field }"></ng-container>
            </ng-container>

            <!-- Selector de Base -->
            <ng-container *ngTemplateOutlet="fieldTpl; context: { $implicit: baseField }"></ng-container>

            <!-- Categoría -->
            <ng-container *ngTemplateOutlet="fieldTpl; context: { $implicit: categoryField }"></ng-container>

            <!-- Campos dinámicos según la base seleccionada -->
            <ng-container *ngFor="let field of activeBaseFields">
              <ng-container *ngTemplateOutlet="fieldTpl; context: { $implicit: field }"></ng-container>
            </ng-container>

            <!-- Campos de apéndice de color -->
            <ng-container *ngFor="let field of appendixFields">
              <ng-container *ngTemplateOutlet="fieldTpl; context: { $implicit: field }"></ng-container>
            </ng-container>

            <div class="col-sm-12 mb-3">
              <button type="submit" [disabled]="itemForm.invalid" class="btn btn-primary">Descargar fichero</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Template reutilizable para renderizar cualquier campo -->
<ng-template #fieldTpl let-field>
  <div [ngClass]="field.colClass || 'col-sm-6'" class="mb-3">
    <div class="form-group">
      <label [for]="field.name" [class.required-field]="field.required">{{ field.label }}</label>
      <small *ngIf="field.description" class="form-text text-muted d-block mb-1">{{ field.description }}</small>

      <!-- Text input -->
      <input *ngIf="field.type === 'text'" type="text" class="form-control"
        [id]="field.name" [formControlName]="field.name"
        [placeholder]="field.placeholder || ''" [readonly]="field.readonly || false">

      <!-- Number input -->
      <input *ngIf="field.type === 'number'" type="number" class="form-control"
        [id]="field.name" [formControlName]="field.name"
        [placeholder]="field.placeholder || ''" [readonly]="field.readonly || false">

      <!-- Textarea -->
      <textarea *ngIf="field.type === 'textarea'" class="form-control"
        [id]="field.name" [formControlName]="field.name"
        [placeholder]="field.placeholder || ''" rows="3" [readonly]="field.readonly || false"></textarea>

      <!-- Select -->
      <select *ngIf="field.type === 'select'" class="form-control"
        [id]="field.name" [formControlName]="field.name">
        <option *ngFor="let opt of field.options" [ngValue]="opt.value">{{ opt.label }}</option>
      </select>

      <!-- Checkbox -->
      <input *ngIf="field.type === 'checkbox'" type="checkbox" class="form-check-input"
        [id]="field.name" [formControlName]="field.name">

      <!-- Validation message -->
      <small *ngIf="field.required && itemForm.get(field.name)?.invalid && itemForm.get(field.name)?.touched"
        class="text-danger">
        Este campo es obligatorio.
      </small>
    </div>
  </div>
</ng-template>
